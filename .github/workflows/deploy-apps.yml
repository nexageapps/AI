name: Deploy Applications to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'application/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      wumpus:     ${{ steps.filter.outputs.wumpus }}
      gradient:   ${{ steps.filter.outputs.gradient }}
      nn-trainer: ${{ steps.filter.outputs.nn-trainer }}
      kg-playground: ${{ steps.filter.outputs.kg-playground }}
      model-eval: ${{ steps.filter.outputs.model-eval }}
      index:      ${{ steps.filter.outputs.index }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            wumpus:
              - 'application/compsci713/week2/wumpus/**'
            gradient:
              - 'application/compsci714/week2/gradient-descent-game/**'
            nn-trainer:
              - 'application/compsci714/week2/nn-learning-game/**'
            kg-playground:
              - 'application/compsci713/week3/kg-playground/**'
            model-eval:
              - 'application/compsci713/week3/model-evaluation-dashboard/**'
            index:
              - 'index.html'

  deploy-index:
    needs: detect-changes
    if: needs.detect-changes.outputs.index == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p deploy-temp && cp index.html deploy-temp/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-temp
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-wumpus:
    needs: detect-changes
    if: needs.detect-changes.outputs.wumpus == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week2/wumpus/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week2/wumpus
      - run: npm run build
        working-directory: application/compsci713/week2/wumpus
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week2/wumpus/build
          destination_dir: wumpus
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-nn-trainer:
    needs: detect-changes
    if: needs.detect-changes.outputs.nn-trainer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/compsci714/week2/nn-learning-game/package-lock.json
      - run: npm ci
        working-directory: application/compsci714/week2/nn-learning-game
      - run: npm run build
        working-directory: application/compsci714/week2/nn-learning-game
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci714/week2/nn-learning-game/dist
          destination_dir: nn-trainer
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-gradient:
    needs: detect-changes
    if: needs.detect-changes.outputs.gradient == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci714/week2/gradient-descent-game/package-lock.json
      - run: npm ci
        working-directory: application/compsci714/week2/gradient-descent-game
      - run: npm run build
        working-directory: application/compsci714/week2/gradient-descent-game
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci714/week2/gradient-descent-game/docs
          destination_dir: gradient-descent
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-kg-playground:
    needs: detect-changes
    if: needs.detect-changes.outputs.kg-playground == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: application/compsci713/week3/kg-playground
      - run: npm run build
        working-directory: application/compsci713/week3/kg-playground
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week3/kg-playground/build
          destination_dir: compsci713/week3/kg-playground
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-model-eval:
    needs: detect-changes
    if: needs.detect-changes.outputs.model-eval == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week3/model-evaluation-dashboard/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week3/model-evaluation-dashboard
      - run: npm run build
        working-directory: application/compsci713/week3/model-evaluation-dashboard
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week3/model-evaluation-dashboard/build
          destination_dir: compsci713/week3/model-evaluation
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
