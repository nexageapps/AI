name: Deploy Applications to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'application/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      wumpus:     ${{ steps.filter.outputs.wumpus }}
      gradient:   ${{ steps.filter.outputs.gradient }}
      nn-trainer: ${{ steps.filter.outputs.nn-trainer }}
      kg-playground: ${{ steps.filter.outputs.kg-playground }}
      model-eval: ${{ steps.filter.outputs.model-eval }}
      symbolic-logic: ${{ steps.filter.outputs.symbolic-logic }}
      neural-network: ${{ steps.filter.outputs.neural-network }}
      rnn-explorer: ${{ steps.filter.outputs.rnn-explorer }}
      index:      ${{ steps.filter.outputs.index }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            wumpus:
              - 'application/compsci713/week2/wumpus/**'
            gradient:
              - 'application/compsci714/week2/gradient-descent-game/**'
            nn-trainer:
              - 'application/compsci714/week2/nn-learning-game/**'
            kg-playground:
              - 'application/compsci713/week3/kg-playground/**'
            model-eval:
              - 'application/compsci713/week3/model-evaluation-dashboard/**'
            symbolic-logic:
              - 'application/compsci713/week1/symbolic-logic/**'
            neural-network:
              - 'application/compsci713/week2/neural-network/**'
            rnn-explorer:
              - 'application/compsci713/week4/rnn-explorer/**'
            index:
              - 'index.html'

  deploy-index:
    needs: detect-changes
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.index == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p deploy-temp && cp index.html deploy-temp/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-temp
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-wumpus:
    needs: [detect-changes, deploy-index]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.wumpus == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week2/wumpus/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week2/wumpus
      - run: npm run build
        working-directory: application/compsci713/week2/wumpus
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week2/wumpus/build
          destination_dir: wumpus
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-nn-trainer:
    needs: [detect-changes, deploy-wumpus]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.nn-trainer == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: application/compsci714/week2/nn-learning-game/package-lock.json
      - run: npm ci
        working-directory: application/compsci714/week2/nn-learning-game
      - run: npm run build
        working-directory: application/compsci714/week2/nn-learning-game
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci714/week2/nn-learning-game/dist
          destination_dir: nn-trainer
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-gradient:
    needs: [detect-changes, deploy-nn-trainer]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.gradient == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci714/week2/gradient-descent-game/package-lock.json
      - run: npm ci
        working-directory: application/compsci714/week2/gradient-descent-game
      - run: npm run build
        working-directory: application/compsci714/week2/gradient-descent-game
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci714/week2/gradient-descent-game/docs
          destination_dir: gradient-descent
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-kg-playground:
    needs: [detect-changes, deploy-gradient]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.kg-playground == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: application/compsci713/week3/kg-playground
      - run: npm run build
        working-directory: application/compsci713/week3/kg-playground
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week3/kg-playground/build
          destination_dir: compsci713/week3/kg-playground
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-model-eval:
    needs: [detect-changes, deploy-kg-playground]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.model-eval == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static files
        run: |
          mkdir -p deploy-model-eval
          cp application/compsci713/week3/model-evaluation-dashboard/index.html deploy-model-eval/
          cp application/compsci713/week3/model-evaluation-dashboard/app.js deploy-model-eval/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-model-eval
          destination_dir: compsci713/week3/model-evaluation
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-symbolic-logic:
    needs: [detect-changes, deploy-model-eval]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.symbolic-logic == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week1/symbolic-logic/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week1/symbolic-logic
      - run: npm run build
        working-directory: application/compsci713/week1/symbolic-logic
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week1/symbolic-logic/build
          destination_dir: symbolic-logic
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-neural-network:
    needs: [detect-changes, deploy-symbolic-logic]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.neural-network == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week2/neural-network/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week2/neural-network
      - run: npm run build
        working-directory: application/compsci713/week2/neural-network
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          publish_dir: ./application/compsci713/week2/neural-network/build
          destination_dir: neural-network
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  deploy-rnn-explorer:
    needs: [detect-changes, deploy-neural-network]
    if: always() && !cancelled() && !failure() && (needs.detect-changes.outputs.rnn-explorer == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week4/rnn-explorer/package-lock.json
      - run: npm ci
        working-directory: application/compsci713/week4/rnn-explorer
      - run: npm run build
        working-directory: application/compsci713/week4/rnn-explorer
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week4/rnn-explorer/build
          destination_dir: rnn-explorer
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
