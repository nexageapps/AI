name: Deploy Applications to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'application/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Detect which apps changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      wumpus: ${{ steps.filter.outputs.wumpus }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            wumpus:
              - 'application/compsci713/week2/wumpus/**'

  # Build and deploy Wumpus World
  deploy-wumpus:
    needs: detect-changes
    if: needs.detect-changes.outputs.wumpus == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci713/week2/wumpus/package-lock.json
      
      - name: Install dependencies
        working-directory: application/compsci713/week2/wumpus
        run: npm ci
      
      - name: Build
        working-directory: application/compsci713/week2/wumpus
        run: npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci713/week2/wumpus/build
          destination_dir: wumpus
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
