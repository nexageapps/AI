name: Deploy Data Preprocessing Studio

on:
  push:
    branches: [ main ]
    paths:
      - 'application/compsci714/week3/data-preprocessing-studio/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: application/compsci714/week3/data-preprocessing-studio/package-lock.json

      - name: Install dependencies
        working-directory: ./application/compsci714/week3/data-preprocessing-studio
        run: npm ci

      - name: Build application
        working-directory: ./application/compsci714/week3/data-preprocessing-studio
        run: npm run build
        env:
          PUBLIC_URL: /AI/compsci714/week3/data-preprocessing-studio
          CI: false

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./application/compsci714/week3/data-preprocessing-studio/build
          destination_dir: compsci714/week3/data-preprocessing-studio
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
