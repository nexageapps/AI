<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Evaluation Dashboard | UoA COMPSCI 713</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.js"></script>
    <script>
        async function main() {
            const response = await fetch("app.py");
            const appCode = await response.text();

            stlite.mount(
                {
                    requirements: [
                        "pandas",
                        "numpy",
                        "scikit-learn",
                        "plotly",
                        "openpyxl",
                    ],
                    entrypoint: "app.py",
                    files: {
                        "app.py": appCode,
                    },
                },
                document.getElementById("root")
            );
        }
        main();
    </script>
</body>
</html>
